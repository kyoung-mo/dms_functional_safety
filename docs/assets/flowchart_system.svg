<svg xmlns="http://www.w3.org/2000/svg" width="840" height="1095" viewBox="0 0 840 1095" font-family="Noto Sans CJK KR, Malgun Gothic, sans-serif">
<defs>
<marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1 1L9 5L1 9Z" fill="#555"/></marker>
<marker id="ahr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1 1L9 5L1 9Z" fill="#C0392B"/></marker>
</defs>
<rect width="840" height="1095" fill="#FFFFFF"/>

<text x="420" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="#222">DMS 시스템 전체 동작 흐름</text>
<text x="420" y="44" text-anchor="middle" font-size="11" fill="#888">RPi5 졸음 인식 → STM32 안전 제어 → RPi5 네비·관제</text>

<!-- start pill -->
<rect x="345" y="56" width="150" height="32" rx="16" fill="#3A3F44"/>
<text x="420" y="77" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">시스템 시작</text>
<line x1="420" y1="88" x2="420" y2="113" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- ===== Container 1: RPi5 ===== -->
<rect x="40" y="100" width="770" height="508" rx="14" fill="#EAF6EC" stroke="#2E7D32" stroke-width="1.2" stroke-dasharray="6 4"/>
<text x="56" y="122" font-size="12" font-weight="700" fill="#2E7D32">RPi5 졸음 인식 노드 (Hailo-8 NPU)</text>

<rect x="320" y="130" width="200" height="46" rx="8" fill="#2E7D32"/>
<text x="420" y="149" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">카메라 프레임 캡처</text>
<text x="420" y="166" text-anchor="middle" font-size="9.5" fill="#C8E6C9">PiCamera2 · 640×480</text>
<line x1="420" y1="176" x2="420" y2="199" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<polygon points="420,202 530,238 420,274 310,238" fill="#FFFFFF" stroke="#2E7D32" stroke-width="1.5"/>
<text x="420" y="235" text-anchor="middle" font-size="12" font-weight="700" fill="#222">얼굴 감지?</text>
<text x="420" y="251" text-anchor="middle" font-size="9.5" fill="#777">YOLOv8-face</text>

<!-- No: State=0 side box -->
<line x1="310" y1="238" x2="288" y2="238" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="299" y="227" text-anchor="middle" font-size="10.5" font-weight="700" fill="#666">No</text>
<rect x="170" y="220" width="115" height="36" rx="8" fill="#6E747B"/>
<text x="227" y="243" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">State = 0</text>
<path d="M227 256 V576 H318" fill="none" stroke="#888" stroke-width="1.4" marker-end="url(#ah)"/>

<!-- Yes down -->
<line x1="420" y1="274" x2="420" y2="297" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="430" y="290" font-size="10.5" font-weight="700" fill="#2E7D32">Yes</text>

<rect x="300" y="300" width="240" height="58" rx="8" fill="#00897B"/>
<text x="420" y="320" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">랜드마크 추출 · EAR 계산</text>
<text x="420" y="336" text-anchor="middle" font-size="9.5" fill="#CFF3EE">face_landmarks_lite · 468pts</text>
<text x="420" y="350" text-anchor="middle" font-size="9.5" fill="#CFF3EE">Eye Aspect Ratio (양쪽 눈 각 6점)</text>
<line x1="420" y1="358" x2="420" y2="381" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<polygon points="420,384 540,422 420,460 300,422" fill="#FFFFFF" stroke="#00897B" stroke-width="1.5"/>
<text x="420" y="419" text-anchor="middle" font-size="12" font-weight="700" fill="#222">PERCLOS 졸음 판정</text>
<text x="420" y="435" text-anchor="middle" font-size="9.5" fill="#777">동적 임계값 · 1.5초 지속</text>

<!-- 위험: State=2 side box -->
<line x1="540" y1="422" x2="562" y2="422" stroke="#C0392B" stroke-width="1.5" marker-end="url(#ahr)"/>
<text x="551" y="411" text-anchor="middle" font-size="10.5" font-weight="700" fill="#C0392B">위험</text>
<rect x="565" y="404" width="115" height="36" rx="8" fill="#C0392B"/>
<text x="622" y="427" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">State = 2</text>
<path d="M622 440 V576 H552" fill="none" stroke="#C0392B" stroke-width="1.4" marker-end="url(#ahr)"/>

<!-- 정상/주의 down -->
<line x1="420" y1="460" x2="420" y2="483" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="430" y="476" font-size="10.5" font-weight="700" fill="#43A047">정상/주의</text>

<rect x="350" y="486" width="140" height="36" rx="8" fill="#43A047"/>
<text x="420" y="509" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">State = 0/1</text>
<line x1="420" y1="522" x2="420" y2="550" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<rect x="290" y="553" width="260" height="46" rx="8" fill="#1B5E20"/>
<text x="420" y="572" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">UART 바이너리 프레임 송신</text>
<text x="420" y="589" text-anchor="middle" font-size="9" fill="#C8E6C9">[0xAA, State, EAR×100, Seq, CRC] · 100ms</text>
<text x="700" y="580" text-anchor="middle" font-size="9.5" fill="#888">※ 매 프레임 반복</text>

<line x1="420" y1="599" x2="420" y2="646" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- ===== Container 2: STM32 ===== -->
<rect x="40" y="618" width="770" height="244" rx="14" fill="#FFF3E6" stroke="#E65100" stroke-width="1.2" stroke-dasharray="6 4"/>
<text x="56" y="640" font-size="12" font-weight="700" fill="#D84315">STM32 안전 제어 노드 (FreeRTOS)</text>

<rect x="300" y="650" width="240" height="46" rx="8" fill="#D84315"/>
<text x="420" y="669" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">STM32: UART 수신</text>
<text x="420" y="686" text-anchor="middle" font-size="9.5" fill="#FBD9CC">상태머신 파싱 · Task Queue 전달</text>
<line x1="420" y1="696" x2="420" y2="719" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<polygon points="420,722 535,758 420,794 305,758" fill="#FFFFFF" stroke="#E65100" stroke-width="1.5"/>
<text x="420" y="755" text-anchor="middle" font-size="12" font-weight="700" fill="#222">Heartbeat 단절?</text>
<text x="420" y="771" text-anchor="middle" font-size="9.5" fill="#777">500ms 미수신</text>

<!-- 단절: DTC side box -->
<line x1="535" y1="758" x2="557" y2="758" stroke="#C0392B" stroke-width="1.5" marker-end="url(#ahr)"/>
<text x="546" y="747" text-anchor="middle" font-size="10.5" font-weight="700" fill="#C0392B">단절</text>
<rect x="560" y="735" width="195" height="46" rx="8" fill="#BF360C"/>
<text x="657" y="754" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">DTC 0x7DF 송출</text>
<text x="657" y="771" text-anchor="middle" font-size="9.5" fill="#FBD9CC">Failsafe 진입 · LED 소등</text>

<!-- 정상 down -->
<line x1="420" y1="794" x2="420" y2="817" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="430" y="810" font-size="10.5" font-weight="700" fill="#EF6C00">정상</text>

<rect x="290" y="820" width="260" height="46" rx="8" fill="#EF6C00"/>
<text x="420" y="839" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">LED 경고 · CAN 0x100 송신</text>
<text x="420" y="856" text-anchor="middle" font-size="9.5" fill="#FFE6CC">졸음 상태 + EAR → RPi5 네비 · 100ms</text>

<line x1="420" y1="866" x2="420" y2="908" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="463" y="876" font-size="10" font-weight="700" fill="#1565C0">CAN 0x100</text>

<!-- ===== Container 3: navi ===== -->
<rect x="40" y="880" width="770" height="190" rx="14" fill="#E9F2FC" stroke="#1565C0" stroke-width="1.2" stroke-dasharray="6 4"/>
<text x="56" y="902" font-size="12" font-weight="700" fill="#1565C0">RPi5 네비 노드 (MCP2515)</text>

<rect x="290" y="912" width="260" height="46" rx="8" fill="#1565C0"/>
<text x="420" y="931" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">RPi5 네비: CAN 0x100 수신</text>
<text x="420" y="948" text-anchor="middle" font-size="9.5" fill="#CFE3F8">MCP2515 · SocketCAN · cantools</text>
<line x1="420" y1="958" x2="420" y2="981" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<polygon points="420,984 520,1018 420,1052 320,1018" fill="#FFFFFF" stroke="#1565C0" stroke-width="1.5"/>
<text x="420" y="1015" text-anchor="middle" font-size="12" font-weight="700" fill="#222">State == 2?</text>
<text x="420" y="1031" text-anchor="middle" font-size="9.5" fill="#777">위험 판정</text>

<!-- No: left -->
<line x1="320" y1="1018" x2="298" y2="1018" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="309" y="1007" text-anchor="middle" font-size="10.5" font-weight="700" fill="#666">No</text>
<rect x="130" y="995" width="165" height="46" rx="8" fill="#1976D2"/>
<text x="212" y="1014" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">카카오맵 경로</text>
<text x="212" y="1031" text-anchor="middle" font-size="9.5" fill="#CFE3F8">실시간 업데이트</text>

<!-- Yes: right -->
<line x1="520" y1="1018" x2="542" y2="1018" stroke="#C0392B" stroke-width="1.5" marker-end="url(#ahr)"/>
<text x="531" y="1007" text-anchor="middle" font-size="10.5" font-weight="700" fill="#C0392B">Yes</text>
<rect x="545" y="989" width="230" height="58" rx="8" fill="#5D4037"/>
<text x="660" y="1009" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">Firebase 이벤트 저장</text>
<text x="660" y="1025" text-anchor="middle" font-size="9" fill="#E5D6CF">GPS · 시각 · driver_id · session_id</text>
<text x="660" y="1039" text-anchor="middle" font-size="9" fill="#E5D6CF">카카오맵 졸음 마커 표시</text>
</svg>

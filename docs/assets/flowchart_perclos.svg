<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="835" viewBox="0 0 1000 835" font-family="Noto Sans CJK KR, Malgun Gothic, sans-serif">
<defs>
<marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M1 1L9 5L1 9Z" fill="#555"/>
</marker>
<marker id="ahg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M1 1L9 5L1 9Z" fill="#1D9E75"/>
</marker>
<marker id="ahr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M1 1L9 5L1 9Z" fill="#C0392B"/>
</marker>
</defs>

<rect width="1000" height="835" fill="#FFFFFF"/>

<text x="500" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="#222">PERCLOS 졸음 판정 알고리즘</text>
<text x="500" y="44" text-anchor="middle" font-size="11" fill="#888">rpi5 / inference / perclos.py</text>

<!-- containers -->
<rect x="15" y="195" width="470" height="620" rx="14" fill="#EAF6F0" stroke="#1D9E75" stroke-width="1.2" stroke-dasharray="6 4"/>
<text x="30" y="216" font-size="12" font-weight="700" fill="#0F6E56">정상 모드 (Normal Mode)</text>
<rect x="505" y="195" width="480" height="620" rx="14" fill="#FDEDED" stroke="#C0392B" stroke-width="1.2" stroke-dasharray="6 4"/>
<text x="968" y="216" text-anchor="end" font-size="12" font-weight="700" fill="#A32D2D">졸음 모드 (Drowsy Mode)</text>

<!-- top: EAR input pill -->
<rect x="415" y="58" width="170" height="34" rx="17" fill="#3A3F44"/>
<text x="500" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#FFF">EAR 입력 (프레임마다)</text>
<line x1="500" y1="92" x2="500" y2="113" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- diamond: is_drowsy? -->
<polygon points="500,116 600,153 500,190 400,153" fill="#FFFFFF" stroke="#555" stroke-width="1.5"/>
<text x="500" y="149" text-anchor="middle" font-size="13" font-weight="700" fill="#222">is_drowsy?</text>
<text x="500" y="166" text-anchor="middle" font-size="10" fill="#777">졸음 모드 진입 여부</text>

<!-- branch left (No) / right (Yes) -->
<path d="M400 153 H260 V228" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#ahg)"/>
<text x="330" y="146" text-anchor="middle" font-size="11" font-weight="700" fill="#1D9E75">No (정상)</text>
<path d="M600 153 H740 V228" fill="none" stroke="#C0392B" stroke-width="1.5" marker-end="url(#ahr)"/>
<text x="670" y="146" text-anchor="middle" font-size="11" font-weight="700" fill="#C0392B">Yes (졸음)</text>

<!-- ===== LEFT column, spine x=260 ===== -->
<!-- 1. ear_history.append -->
<rect x="160" y="232" width="200" height="48" rx="8" fill="#1D9E75"/>
<text x="260" y="252" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">ear_history.append(ear)</text>
<text x="260" y="269" text-anchor="middle" font-size="10" fill="#D5F2E6">maxlen=300 (~30초)</text>
<line x1="260" y1="280" x2="260" y2="303" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- 2. threshold calc -->
<rect x="145" y="306" width="230" height="48" rx="8" fill="#0F8A66"/>
<text x="260" y="326" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">동적 threshold 계산</text>
<text x="260" y="343" text-anchor="middle" font-size="10" fill="#D5F2E6">np.percentile(history, 90) × 0.75</text>
<line x1="260" y1="354" x2="260" y2="377" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- 3. diamond EAR < threshold -->
<polygon points="260,380 355,415 260,450 165,415" fill="#FFFFFF" stroke="#555" stroke-width="1.5"/>
<text x="260" y="412" text-anchor="middle" font-size="12" font-weight="700" fill="#222">EAR &lt; threshold?</text>
<text x="260" y="428" text-anchor="middle" font-size="10" fill="#777">눈 감김 판단</text>

<!-- No side box: drowsy_counter = 0 -->
<line x1="165" y1="415" x2="153" y2="415" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="158" y="404" text-anchor="end" font-size="10.5" font-weight="700" fill="#666">No</text>
<rect x="28" y="396" width="122" height="38" rx="8" fill="#6E747B"/>
<text x="89" y="419" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">drowsy_counter = 0</text>
<path d="M89 434 V580 H157" fill="none" stroke="#888" stroke-width="1.4" marker-end="url(#ah)"/>

<!-- Yes down -->
<line x1="260" y1="450" x2="260" y2="473" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="270" y="466" font-size="10.5" font-weight="700" fill="#1D9E75">Yes</text>
<rect x="180" y="476" width="160" height="38" rx="8" fill="#2E9E4F"/>
<text x="260" y="500" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">drowsy_counter++</text>
<line x1="260" y1="514" x2="260" y2="542" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- 4. diamond counter >= 20 -->
<polygon points="260,545 360,580 260,615 160,580" fill="#FFFFFF" stroke="#555" stroke-width="1.5"/>
<text x="260" y="577" text-anchor="middle" font-size="12" font-weight="700" fill="#222">counter ≥ 20?</text>
<text x="260" y="593" text-anchor="middle" font-size="10" fill="#777">~1.5초 @ 13fps</text>

<!-- Yes -> drowsy mode entry (right, up through gap, into is_drowsy=True) -->
<path d="M360 580 H493 V256 H626" fill="none" stroke="#C0392B" stroke-width="1.6" marker-end="url(#ahr)"/>
<text x="420" y="572" text-anchor="middle" font-size="10.5" font-weight="700" fill="#C0392B">Yes · 졸음 진입</text>

<!-- No down -->
<line x1="260" y1="615" x2="260" y2="638" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="270" y="631" font-size="10.5" font-weight="700" fill="#666">No</text>

<!-- 5. diamond counter > 5 -->
<polygon points="260,641 350,674 260,707 170,674" fill="#FFFFFF" stroke="#555" stroke-width="1.5"/>
<text x="260" y="671" text-anchor="middle" font-size="12" font-weight="700" fill="#222">counter &gt; 5?</text>
<text x="260" y="687" text-anchor="middle" font-size="10" fill="#777">주의 임계</text>

<!-- Yes -> State = 1 -->
<line x1="350" y1="674" x2="372" y2="674" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="361" y="663" text-anchor="middle" font-size="10.5" font-weight="700" fill="#E8821E">Yes</text>
<rect x="375" y="655" width="95" height="38" rx="8" fill="#E8821E"/>
<text x="422" y="672" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">State = 1</text>
<text x="422" y="687" text-anchor="middle" font-size="9.5" fill="#FFF3E2">주의</text>

<!-- No down -> State = 0 -->
<line x1="260" y1="707" x2="260" y2="730" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="270" y="723" font-size="10.5" font-weight="700" fill="#666">No</text>
<rect x="190" y="733" width="140" height="42" rx="8" fill="#0F6E56"/>
<text x="260" y="751" text-anchor="middle" font-size="13" font-weight="700" fill="#FFF">State = 0</text>
<text x="260" y="767" text-anchor="middle" font-size="9.5" fill="#D5F2E6">정상</text>

<!-- ===== RIGHT column, spine x=740 ===== -->
<!-- 1. is_drowsy = True (same y as ear_history) -->
<rect x="630" y="232" width="220" height="48" rx="8" fill="#A32D2D"/>
<text x="740" y="252" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">is_drowsy = True</text>
<text x="740" y="269" text-anchor="middle" font-size="10" fill="#F7D9D9">frozen_threshold = current_threshold</text>
<line x1="740" y1="280" x2="740" y2="303" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- 2. history update stop -->
<rect x="630" y="306" width="220" height="48" rx="8" fill="#D9453A"/>
<text x="740" y="326" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">ear_history 업데이트 중단</text>
<text x="740" y="343" text-anchor="middle" font-size="10" fill="#FBE3E1">threshold 오염 방지</text>
<line x1="740" y1="354" x2="740" y2="377" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- 3. diamond EAR > frozen_threshold -->
<polygon points="740,380 850,415 740,450 630,415" fill="#FFFFFF" stroke="#555" stroke-width="1.5"/>
<text x="740" y="412" text-anchor="middle" font-size="12" font-weight="700" fill="#222">EAR &gt; frozen_threshold?</text>
<text x="740" y="428" text-anchor="middle" font-size="10" fill="#777">눈 뜸 감지</text>

<!-- No side box: counter = 0 -->
<line x1="850" y1="415" x2="868" y2="415" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="859" y="404" text-anchor="middle" font-size="10.5" font-weight="700" fill="#666">No</text>
<rect x="871" y="396" width="100" height="38" rx="8" fill="#6E747B"/>
<text x="921" y="419" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">counter = 0</text>
<path d="M921 434 V580 H847" fill="none" stroke="#888" stroke-width="1.4" marker-end="url(#ah)"/>

<!-- Yes down -->
<line x1="740" y1="450" x2="740" y2="473" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="750" y="466" font-size="10.5" font-weight="700" fill="#7B2FBE">Yes</text>
<rect x="655" y="476" width="170" height="38" rx="8" fill="#7B2FBE"/>
<text x="740" y="500" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">recovery_counter++</text>
<line x1="740" y1="514" x2="740" y2="542" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- 4. diamond counter >= 10 -->
<polygon points="740,545 845,580 740,615 635,580" fill="#FFFFFF" stroke="#555" stroke-width="1.5"/>
<text x="740" y="577" text-anchor="middle" font-size="12" font-weight="700" fill="#222">counter ≥ 10?</text>
<text x="740" y="593" text-anchor="middle" font-size="10" fill="#777">~0.7초 눈 뜬 상태 유지</text>

<!-- No -> State = 2 (left side box) -->
<line x1="635" y1="580" x2="623" y2="580" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="631" y="557" text-anchor="end" font-size="10.5" font-weight="700" fill="#C0392B">No</text>
<rect x="520" y="561" width="100" height="38" rx="8" fill="#C0392B"/>
<text x="570" y="578" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">State = 2</text>
<text x="570" y="593" text-anchor="middle" font-size="9.5" fill="#F7D9D9">위험 지속</text>

<!-- Yes down -> is_drowsy = False -->
<line x1="740" y1="615" x2="740" y2="638" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="750" y="631" font-size="10.5" font-weight="700" fill="#1F6B30">Yes</text>
<rect x="620" y="641" width="240" height="48" rx="8" fill="#1F6B30"/>
<text x="740" y="661" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">is_drowsy = False</text>
<text x="740" y="678" text-anchor="middle" font-size="10" fill="#D7EBDB">frozen_threshold = None → State = 0</text>

<text x="740" y="716" text-anchor="middle" font-size="10.5" fill="#888">※ 다음 프레임부터 정상 모드로 복귀</text>
</svg>

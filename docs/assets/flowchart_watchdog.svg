<svg xmlns="http://www.w3.org/2000/svg" width="980" height="800" viewBox="0 0 980 800" font-family="Noto Sans CJK KR, Malgun Gothic, sans-serif">
<defs>
<marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1 1L9 5L1 9Z" fill="#555"/></marker>
<marker id="ahd" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1 1L9 5L1 9Z" fill="#999"/></marker>
</defs>
<rect width="980" height="800" fill="#FFFFFF"/>

<text x="490" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="#222">Watchdog / Failsafe 동작 흐름</text>
<text x="490" y="44" text-anchor="middle" font-size="11" fill="#888">stm32 / Core / Src / freertos.c</text>

<!-- containers -->
<rect x="25" y="62" width="445" height="700" rx="14" fill="#FFF3E6" stroke="#E65100" stroke-width="1.2" stroke-dasharray="6 4"/>
<text x="42" y="86" font-size="12" font-weight="700" fill="#D84315">Task_Watchdog · TIM2 100ms 인터럽트</text>
<text x="42" y="102" font-size="10" fill="#E58A5A">우선순위 최상위 (5)</text>

<rect x="510" y="62" width="445" height="700" rx="14" fill="#E9F2FC" stroke="#1565C0" stroke-width="1.2" stroke-dasharray="6 4"/>
<text x="527" y="86" font-size="12" font-weight="700" fill="#1565C0">Task_UART_Rx · HAL_UART_Receive_IT</text>
<text x="527" y="102" font-size="10" fill="#6FA0D8">우선순위 중간 (3)</text>

<!-- ===== LEFT column, spine x=245 ===== -->
<rect x="135" y="120" width="220" height="46" rx="8" fill="#EF6C00"/>
<text x="245" y="139" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">TIM2 인터럽트 발생</text>
<text x="245" y="156" text-anchor="middle" font-size="9.5" fill="#FFE6CC">100ms 마다</text>
<line x1="245" y1="166" x2="245" y2="189" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<rect x="135" y="192" width="220" height="46" rx="8" fill="#BF360C"/>
<text x="245" y="211" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">hb_counter--</text>
<text x="245" y="228" text-anchor="middle" font-size="9.5" fill="#FBD9CC">카운터 감소 (초기값=5)</text>
<line x1="245" y1="238" x2="245" y2="261" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<polygon points="245,264 360,302 245,340 130,302" fill="#FFFFFF" stroke="#E65100" stroke-width="1.5"/>
<text x="245" y="299" text-anchor="middle" font-size="12" font-weight="700" fill="#222">hb_counter == 0?</text>
<text x="245" y="315" text-anchor="middle" font-size="9.5" fill="#777">500ms 경과 여부</text>

<!-- No: 대기 side box + dashed loop back to TIM2 -->
<line x1="130" y1="302" x2="112" y2="302" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="121" y="291" text-anchor="middle" font-size="10.5" font-weight="700" fill="#666">No</text>
<rect x="40" y="284" width="70" height="36" rx="8" fill="#6E747B"/>
<text x="75" y="307" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">대기</text>
<path d="M75 284 V143 H132" fill="none" stroke="#999" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#ahd)"/>
<text x="83" y="200" font-size="9" fill="#999">다음 주기</text>

<!-- Yes down -->
<line x1="245" y1="340" x2="245" y2="363" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="255" y="356" font-size="10.5" font-weight="700" fill="#C62828">Yes (단절)</text>

<rect x="135" y="366" width="220" height="46" rx="8" fill="#C62828"/>
<text x="245" y="385" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">failsafe_flag = True</text>
<text x="245" y="402" text-anchor="middle" font-size="9.5" fill="#F5C7C7">Failsafe 상태 진입</text>
<line x1="245" y1="412" x2="245" y2="435" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<rect x="135" y="438" width="220" height="46" rx="8" fill="#8E0000"/>
<text x="245" y="457" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">CAN 0x7DF 송출</text>
<text x="245" y="474" text-anchor="middle" font-size="9.5" fill="#E8BDBD">DTC_CODE=0xFF01 · UDS 포맷</text>
<line x1="245" y1="484" x2="245" y2="507" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<rect x="135" y="510" width="220" height="46" rx="8" fill="#D32F2F"/>
<text x="245" y="529" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">LED 소등</text>
<text x="245" y="546" text-anchor="middle" font-size="9.5" fill="#F5C7C7">PB14 → LOW · 상태 불명</text>
<line x1="245" y1="556" x2="245" y2="579" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<rect x="135" y="582" width="220" height="46" rx="8" fill="#D84315"/>
<text x="245" y="601" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">Task_Alert 큐 전달</text>
<text x="245" y="618" text-anchor="middle" font-size="9.5" fill="#FBD9CC">경고 패턴 변경 알림</text>
<line x1="245" y1="628" x2="245" y2="655" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<rect x="85" y="658" width="320" height="66" rx="10" fill="#FDECEA" stroke="#C62828" stroke-width="1"/>
<text x="245" y="679" text-anchor="middle" font-size="11.5" font-weight="700" fill="#C62828">Failsafe 상태 유지</text>
<text x="245" y="696" text-anchor="middle" font-size="9.5" fill="#8A4A44">UART 수신 재개 시 → 자동 해제</text>
<text x="245" y="710" text-anchor="middle" font-size="9.5" fill="#8A4A44">(오른쪽 컬럼에서 hb_counter 리셋)</text>

<!-- ===== RIGHT column, spine x=732 ===== -->
<rect x="622" y="120" width="220" height="46" rx="8" fill="#1565C0"/>
<text x="732" y="139" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">UART Rx 인터럽트 발생</text>
<text x="732" y="156" text-anchor="middle" font-size="9.5" fill="#CFE3F8">HAL_UART_Receive_IT</text>
<line x1="732" y1="166" x2="732" y2="189" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<polygon points="732,192 837,228 732,264 627,228" fill="#FFFFFF" stroke="#1565C0" stroke-width="1.5"/>
<text x="732" y="225" text-anchor="middle" font-size="12" font-weight="700" fill="#222">Sync == 0xAA?</text>
<text x="732" y="241" text-anchor="middle" font-size="9.5" fill="#777">동기 바이트 확인</text>

<line x1="837" y1="228" x2="859" y2="228" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="848" y="217" text-anchor="middle" font-size="10.5" font-weight="700" fill="#666">No</text>
<rect x="862" y="210" width="78" height="36" rx="8" fill="#6E747B"/>
<text x="901" y="233" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">폐기</text>

<line x1="732" y1="264" x2="732" y2="287" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="742" y="280" font-size="10.5" font-weight="700" fill="#1565C0">Yes</text>

<polygon points="732,290 837,326 732,362 627,326" fill="#FFFFFF" stroke="#1565C0" stroke-width="1.5"/>
<text x="732" y="323" text-anchor="middle" font-size="12" font-weight="700" fill="#222">Checksum OK?</text>
<text x="732" y="339" text-anchor="middle" font-size="9.5" fill="#777">XOR(Byte1~3) 검증</text>

<line x1="837" y1="326" x2="859" y2="326" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="848" y="315" text-anchor="middle" font-size="10.5" font-weight="700" fill="#666">No</text>
<rect x="862" y="308" width="78" height="36" rx="8" fill="#6E747B"/>
<text x="901" y="331" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">폐기</text>

<line x1="732" y1="362" x2="732" y2="385" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="742" y="378" font-size="10.5" font-weight="700" fill="#2E7D32">Yes (유효)</text>

<rect x="622" y="388" width="220" height="46" rx="8" fill="#2E7D32"/>
<text x="732" y="407" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">hb_counter = MAX (5)</text>
<text x="732" y="424" text-anchor="middle" font-size="9.5" fill="#C8E6C9">Heartbeat 타이머 리셋</text>
<line x1="732" y1="434" x2="732" y2="457" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<rect x="622" y="460" width="220" height="46" rx="8" fill="#43A047"/>
<text x="732" y="479" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">failsafe_flag = False</text>
<text x="732" y="496" text-anchor="middle" font-size="9.5" fill="#D7EBDB">Failsafe 해제</text>
<line x1="732" y1="506" x2="732" y2="529" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<rect x="622" y="532" width="220" height="46" rx="8" fill="#1976D2"/>
<text x="732" y="551" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">State, EAR 파싱</text>
<text x="732" y="568" text-anchor="middle" font-size="9.5" fill="#CFE3F8">frame[1]=State · frame[2]=EAR×100</text>
<line x1="732" y1="578" x2="732" y2="601" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<rect x="622" y="604" width="220" height="46" rx="8" fill="#0D47A1"/>
<text x="732" y="623" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFF">Task Queue 전달</text>
<text x="732" y="640" text-anchor="middle" font-size="9.5" fill="#C5D6F0">Task_CAN_Tx · Task_Alert 처리</text>
<line x1="732" y1="650" x2="732" y2="673" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

<rect x="572" y="676" width="320" height="56" rx="10" fill="#EAF3FC" stroke="#1565C0" stroke-width="1"/>
<text x="732" y="697" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1565C0">UART 수신 정상 시 동작</text>
<text x="732" y="715" text-anchor="middle" font-size="9.5" fill="#3F6B9E">LED 상태 업데이트 (Task_Alert) · CAN 0x100 송신 (Task_CAN_Tx)</text>

<!-- cross-link: failsafe release -->
<path d="M620 483 H490 V691 H407" fill="none" stroke="#999" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#ahd)"/>
<rect x="432" y="588" width="116" height="34" rx="6" fill="#FFFFFF"/>
<text x="490" y="601" text-anchor="middle" font-size="9" fill="#888">UART 수신 시 →</text>
<text x="490" y="614" text-anchor="middle" font-size="9" fill="#888">Failsafe 자동 해제</text>
</svg>

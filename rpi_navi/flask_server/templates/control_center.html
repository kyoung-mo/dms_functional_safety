<!DOCTYPE html>
<html lang="ko">
<head>
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=5735c411c5a31661741adfbd0cd7857d&autoload=false"></script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DMS 중앙 관제 시스템</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --sidebar-w: 260px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* 로그인 */
  #login-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 48px 40px;
    width: 360px; text-align: center;
  }
  .login-box .logo { font-size: 13px; font-weight: 600; letter-spacing: 0.15em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
  .login-box h1 { font-size: 22px; font-weight: 700; margin-bottom: 32px; }
  .login-box input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px;
    margin-bottom: 12px; outline: none; transition: border-color 0.2s;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button {
    width: 100%; background: var(--accent); color: #fff; border: none;
    border-radius: 8px; padding: 11px; font-size: 14px; font-weight: 600;
    cursor: pointer; margin-top: 4px; transition: opacity 0.2s;
  }
  .login-box button:hover { opacity: 0.85; }
  .login-error { color: var(--red); font-size: 13px; margin-top: 10px; display: none; }

  /* 사이드바 */
  #sidebar {
    width: var(--sidebar-w); background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .sidebar-header { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
  .sidebar-header .brand { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
  .sidebar-header h2 { font-size: 16px; font-weight: 700; }
  .nav-section { padding: 12px 8px 4px; }
  .nav-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: var(--text-muted); text-transform: uppercase; padding: 0 8px; margin-bottom: 4px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 8px; cursor: pointer;
    font-size: 14px; color: var(--text-muted); transition: all 0.15s;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--surface2); color: var(--accent); font-weight: 600; }
  .driver-list { padding: 4px 8px; flex: 1; overflow-y: auto; }
  .driver-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: 8px; cursor: pointer;
    font-size: 13px; color: var(--text-muted); transition: all 0.15s; margin-bottom: 2px;
  }
  .driver-item:hover { background: var(--surface2); color: var(--text); }
  .driver-item.active { background: var(--surface2); color: var(--text); }
  .driver-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* 메인 */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar {
    height: 52px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; gap: 12px;
    flex-shrink: 0; background: var(--surface);
  }
  .topbar-title { font-size: 15px; font-weight: 600; }
  .topbar-sub { font-size: 13px; color: var(--text-muted); }
  .topbar-spacer { flex: 1; }
  .badge { font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
  .badge-green { background: rgba(63,185,80,0.15); color: var(--green); }

  /* 탭 */
  .tab-content { display: none; flex: 1; overflow: hidden; }
  .tab-content.active { display: flex; flex-direction: column; }

  /* 지도 탭 */
  #map-container { flex: 1; position: relative; min-height: 0; }
  #map { width: 100%; height: 100%; min-height: 400px; }
  .map-overlay {
    position: absolute; top: 16px; right: 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; min-width: 200px; z-index: 10;
  }
  .map-overlay h4 { font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  .driver-legend {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; border-radius: 6px; cursor: pointer;
    transition: background 0.15s; margin-bottom: 2px;
  }
  .driver-legend:hover { background: var(--surface2); }
  .driver-legend.selected { background: var(--surface2); }
  .legend-line { width: 24px; height: 3px; border-radius: 2px; flex-shrink: 0; }
  .legend-name { font-size: 13px; flex: 1; }
  .legend-events { font-size: 11px; color: var(--text-muted); }

  /* 이벤트 팝업 */
  .event-popup {
    position: absolute; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; min-width: 200px; z-index: 20;
    display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    top: 80px; left: 50%; transform: translateX(-50%);
  }
  .event-popup h4 { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
  .event-popup .row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
  .event-popup .row span:first-child { color: var(--text-muted); }
  .event-popup .close-btn { position: absolute; top: 8px; right: 10px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; }

  /* 운전자 상태 탭 */
  #drivers-tab { flex: 1; overflow-y: auto; padding: 24px; }
  .drivers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .driver-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; cursor: pointer; transition: all 0.2s;
  }
  .driver-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .driver-card.selected { border-color: var(--accent); }
  .card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .avatar {
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--surface2); border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
  }
  .card-info h3 { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
  .card-info p { font-size: 12px; color: var(--text-muted); }
  .card-details { border-top: 1px solid var(--border); padding-top: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .detail-item { font-size: 12px; }
  .detail-item .label { color: var(--text-muted); margin-bottom: 2px; }
  .detail-item .value { font-weight: 500; }

  /* 운전자 상세 */
  #driver-detail { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; display: none; }
  #driver-detail.open { display: block; }
  .detail-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .detail-avatar { width: 64px; height: 64px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 28px; border: 2px solid var(--border); }
  .detail-info h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .detail-info p { font-size: 13px; color: var(--text-muted); }
  .detail-meta { display: flex; gap: 24px; margin-bottom: 20px; flex-wrap: wrap; }
  .meta-item { font-size: 13px; }
  .meta-item .label { color: var(--text-muted); margin-bottom: 2px; }
  .meta-item .value { font-weight: 500; }
  .date-selector { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .date-selector label { font-size: 13px; color: var(--text-muted); }
  .date-selector select { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 6px 10px; font-size: 13px; outline: none; }
  #detail-map { width: 100%; height: 300px; border-radius: 8px; margin-bottom: 16px; border: 1px solid var(--border); }
  .session-stats { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; min-width: 120px; }
  .stat-box .label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .stat-box .value { font-size: 18px; font-weight: 700; }
  .events-list h4 { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.08em; }
  .event-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; background: var(--surface2); margin-bottom: 6px; font-size: 13px; }
  .event-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--yellow); flex-shrink: 0; }
  .event-time { color: var(--text-muted); min-width: 80px; }
  .event-loc { flex: 1; color: var(--text-muted); font-size: 12px; }
  .event-state { font-weight: 600; }


  /* 통계 대시보드 탭 */
  #stats-tab { flex: 1; overflow-y: auto; padding: 24px; }
  .stats-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .summary-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; text-align: center;
  }
  .summary-card .s-value { font-size: 32px; font-weight: 700; margin-bottom: 4px; }
  .summary-card .s-label { font-size: 12px; color: var(--text-muted); }
  .stats-section { margin-bottom: 28px; }
  .stats-section h3 { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
  .bar-chart { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: flex; align-items: center; gap: 12px; }
  .bar-name { font-size: 13px; font-weight: 500; min-width: 80px; }
  .bar-wrap { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
  .bar-count { font-size: 13px; font-weight: 600; min-width: 30px; text-align: right; }
  .rank-list { display: flex; flex-direction: column; gap: 10px; }
  .rank-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px;
    display: flex; align-items: center; gap: 14px;
  }
  .rank-card.rank-1 { border-color: var(--red); }
  .rank-num { font-size: 20px; font-weight: 700; color: var(--text-muted); min-width: 28px; }
  .rank-card.rank-1 .rank-num { color: var(--red); }
  .rank-info { flex: 1; }
  .rank-info .name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .rank-info .detail { font-size: 12px; color: var(--text-muted); }
  .rank-badge { font-size: 13px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
  .trend-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .trend-day { background: var(--surface2); border-radius: 8px; padding: 10px 8px; text-align: center; }
  .trend-day .t-date { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  .trend-day .t-count { font-size: 20px; font-weight: 700; }
  .trend-day .t-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">DMS Fleet</div>
    <h1>중앙 관제 시스템</h1>
    <input type="text" id="login-id" placeholder="아이디" value="admin">
    <input type="password" id="login-pw" placeholder="비밀번호" value="admin">
    <button onclick="doLogin()">로그인</button>
    <div class="login-error" id="login-error">아이디 또는 비밀번호가 올바르지 않습니다.</div>
  </div>
</div>

<!-- 사이드바 -->
<div id="sidebar">
  <div class="sidebar-header">
    <div class="brand">DMS Fleet</div>
    <h2>관제 센터</h2>
  </div>
  <div class="nav-section">
    <div class="nav-label">메뉴</div>
    <div class="nav-item active" onclick="switchTab('map')" id="nav-map">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
        <line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/>
      </svg>
      실시간 지도
    </div>
    <div class="nav-item" onclick="switchTab('drivers')" id="nav-drivers">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      운전자 상태
    </div>
    <div class="nav-item" onclick="switchTab('stats')" id="nav-stats">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      통계 대시보드
    </div>
  </div>
  <div class="nav-label" style="padding:12px 16px 4px;font-size:11px;font-weight:600;letter-spacing:0.08em;color:var(--text-muted);text-transform:uppercase;">운전자</div>
  <div class="driver-list" id="sidebar-driver-list"></div>
</div>

<!-- 메인 -->
<div id="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="topbar-title">전체 운전자 현황</div>
      <div class="topbar-sub">실시간 모니터링 중</div>
    </div>
    <div class="topbar-spacer"></div>
    <div class="badge badge-green">● 연결됨</div>
  </div>

  <!-- 지도 탭 -->
  <div class="tab-content active" id="tab-map">
    <div id="map-container">
      <div id="map"></div>
      <div class="map-overlay">
        <h4>운행 경로</h4>
        <div id="legend-list"></div>
      </div>
      <div class="event-popup" id="event-popup">
        <button class="close-btn" onclick="closePopup()">×</button>
        <h4>졸음 이벤트</h4>
        <div id="popup-content"></div>
      </div>
    </div>
  </div>

  <!-- 운전자 상태 탭 -->
  <div class="tab-content" id="tab-drivers">
    <div id="drivers-tab">
      <div class="drivers-grid" id="drivers-grid"></div>
      <div id="driver-detail"></div>
    </div>
  </div>

  <!-- 통계 대시보드 탭 -->
  <div class="tab-content" id="tab-stats">
    <div id="stats-tab">
      <!-- 전체 요약 -->
      <div class="stats-summary" id="stats-summary"></div>

      <!-- 날짜별 졸음 추이 -->
      <div class="stats-section">
        <h3>📅 날짜별 졸음 추이</h3>
        <div class="trend-grid" id="trend-grid"></div>
      </div>

      <!-- 운전자별 졸음 현황 -->
      <div class="stats-section">
        <h3>😴 운전자별 졸음 이벤트</h3>
        <div class="bar-chart" id="bar-chart"></div>
      </div>

      <!-- 위험 운전자 순위 -->
      <div class="stats-section">
        <h3>⚠️ 졸음 위험 순위</h3>
        <div class="rank-list" id="rank-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({ databaseURL: "https://dms-navi-default-rtdb.asia-southeast1.firebasedatabase.app" });
const db = getDatabase(app);

const PALETTE = ['#58a6ff','#3fb950','#e3b341','#f78166','#bc8cff','#39d353','#ffa657'];
let colorIdx = 0;
window.driversData = {};
window.driverColors = {};
window.selectedDriver = null;
window.kakaoMap = null;
window.polylines = {};
window.eventMarkers = {};
window.dangerPolylines = {};

function assignColor(id) {
  if (!window.driverColors[id]) {
    window.driverColors[id] = PALETTE[colorIdx++ % PALETTE.length];
  }
  return window.driverColors[id];
}

window.loadAllData = async function() {
  const [driversSnap, sessionsSnap] = await Promise.all([
    get(ref(db, '/drivers')),
    get(ref(db, '/sessions'))
  ]);
  const drivers = driversSnap.val() || {};
  const sessions = sessionsSnap.val() || {};

  for (const id of Object.keys(drivers)) {
    window.driversData[id] = {
      profile: drivers[id]?.profile || {},
      sessions: sessions[id] || {}
    };
    assignColor(id);
  }

  onValue(ref(db, '/gps'), snap => {
    const gps = snap.val() || {};
    for (const id of Object.keys(gps)) {
      if (window.driversData[id]) window.driversData[id].currentGps = gps[id];
    }
  });

  renderSidebar();
  renderDriversGrid();
  renderAllPaths();
};

function renderSidebar() {
  const el = document.getElementById('sidebar-driver-list');
  el.innerHTML = '';
  for (const [id, d] of Object.entries(window.driversData)) {
    const div = document.createElement('div');
    div.className = 'driver-item';
    div.id = `sidebar-${id}`;
    div.innerHTML = `<div class="driver-dot" style="background:${window.driverColors[id]}"></div><span>${d.profile.name || id}</span>`;
    div.onclick = () => selectDriver(id);
    el.appendChild(div);
  }
}

function renderDriversGrid() {
  const grid = document.getElementById('drivers-grid');
  grid.innerHTML = '';
  for (const [id, d] of Object.entries(window.driversData)) {
    const color = window.driverColors[id];
    const p = d.profile;
    const sessionCount = Object.keys(d.sessions).length;
    const div = document.createElement('div');
    div.className = 'driver-card';
    div.id = `card-${id}`;
    div.innerHTML = `
      <div class="card-header">
        <div class="avatar" style="border-color:${color}">🧑‍✈️</div>
        <div class="card-info"><h3>${p.name || id}</h3><p>${p.company || '-'}</p></div>
      </div>
      <div class="card-details">
        <div class="detail-item"><div class="label">연락처</div><div class="value">${p.phone || '-'}</div></div>
        <div class="detail-item"><div class="label">이메일</div><div class="value" style="font-size:11px">${p.email || '-'}</div></div>
        <div class="detail-item"><div class="label">차량번호</div><div class="value">${p.truck || '-'}</div></div>
        <div class="detail-item"><div class="label">총 운행</div><div class="value">${sessionCount}회</div></div>
      </div>`;
    div.onclick = () => openDriverDetail(id);
    grid.appendChild(div);
  }
}

window.openDriverDetail = function(id) {
  const d = window.driversData[id];
  const p = d.profile;
  const color = window.driverColors[id];
  const sessionKeys = Object.keys(d.sessions).sort().reverse();

  document.querySelectorAll('.driver-card').forEach(c => c.classList.remove('selected'));
  document.getElementById(`card-${id}`)?.classList.add('selected');

  const dateGroups = {};
  sessionKeys.forEach(k => {
    const date = k.slice(0,8);
    const hh = k.slice(9,11);
    const mm = k.slice(11,13);
    const dateLabel = date.slice(0,4)+'-'+date.slice(4,6)+'-'+date.slice(6,8);
    const timeLabel = hh+':'+mm;
    if (!dateGroups[date]) dateGroups[date] = [];
    dateGroups[date].push({ key: k, dateLabel, timeLabel });
  });
  const sessionOptions = Object.entries(dateGroups).map(([date, sessions]) => {
    if (sessions.length === 1) {
      return '<option value="'+sessions[0].key+'">'+sessions[0].dateLabel+' '+sessions[0].timeLabel+'</option>';
    } else {
      return sessions.map((s,i) =>
        '<option value="'+s.key+'">'+s.dateLabel+' '+s.timeLabel+' ('+(i+1)+'회차)</option>'
      ).join('');
    }
  }).join('');

  const detail = document.getElementById('driver-detail');
  detail.className = 'open';
  detail.innerHTML = `
    <div class="detail-header">
      <div class="detail-avatar" style="border-color:${color}">🧑‍✈️</div>
      <div class="detail-info"><h2>${p.name || id}</h2><p>${p.company || ''} · ${p.truck || ''}</p></div>
    </div>
    <div class="detail-meta">
      <div class="meta-item"><div class="label">연락처</div><div class="value">${p.phone || '-'}</div></div>
      <div class="meta-item"><div class="label">이메일</div><div class="value">${p.email || '-'}</div></div>
      <div class="meta-item"><div class="label">총 운행</div><div class="value">${sessionKeys.length}회</div></div>
    </div>
    <div class="date-selector">
      <label>운행 날짜</label>
      <select id="session-select" onchange="loadSessionDetail('${id}', this.value)">${sessionOptions}</select>
    </div>
    <div id="detail-map"></div>
    <div class="session-stats" id="session-stats"></div>
    <div class="events-list"><h4>졸음 이벤트</h4><div id="events-list-content"></div></div>`;

  detail.scrollIntoView({ behavior: 'smooth' });
  if (sessionKeys.length > 0) setTimeout(() => loadSessionDetail(id, sessionKeys[0]), 300);
};

window.loadSessionDetail = function(driverId, sessionId) {
  const session = window.driversData[driverId]?.sessions[sessionId];
  if (!session) return;
  const gpsPath = session.gps_path ? Object.values(session.gps_path) : [];
  const events = session.events ? Object.values(session.events) : [];
  const startTime = session.start_time ? new Date(session.start_time).toLocaleTimeString('ko-KR') : '-';
  const duration = gpsPath.length > 1 ? Math.round((new Date(gpsPath[gpsPath.length-1].timestamp) - new Date(gpsPath[0].timestamp)) / 60000) : 0;

  document.getElementById('session-stats').innerHTML = `
    <div class="stat-box"><div class="label">시작 시각</div><div class="value" style="font-size:14px">${startTime}</div></div>
    <div class="stat-box"><div class="label">운행 시간</div><div class="value">${duration}<span style="font-size:12px;font-weight:400"> 분</span></div></div>
    <div class="stat-box"><div class="label">GPS 기록</div><div class="value">${gpsPath.length}<span style="font-size:12px;font-weight:400"> 점</span></div></div>
    <div class="stat-box"><div class="label">졸음 이벤트</div><div class="value" style="color:${events.length>0?'var(--yellow)':'var(--green)'}">${events.length}<span style="font-size:12px;font-weight:400"> 회</span></div></div>`;

  document.getElementById('events-list-content').innerHTML = events.length === 0
    ? '<div style="font-size:13px;color:var(--text-muted);padding:12px">졸음 이벤트 없음</div>'
    : events.map(e => {
        const t = new Date(e.timestamp).toLocaleTimeString('ko-KR');
        return `<div class="event-row">
          <div class="event-dot"></div>
          <div class="event-time">${t}</div>
          <div class="event-state" style="color:var(--yellow)">졸음 감지</div>
          <div class="event-loc">${e.lat?.toFixed(5)||'-'}, ${e.lon?.toFixed(5)||'-'}</div>
        </div>`;
      }).join('');

  if (gpsPath.length > 0 && window.kakao) {
    const center = gpsPath[Math.floor(gpsPath.length/2)];
    const detailMap = new kakao.maps.Map(document.getElementById('detail-map'), {
      center: new kakao.maps.LatLng(center.lat, center.lon), level: 5
    });
    if (gpsPath.length > 1) {
      new kakao.maps.Polyline({
        map: detailMap,
        path: gpsPath.map(p => new kakao.maps.LatLng(p.lat, p.lon)),
        strokeWeight: 4, strokeColor: window.driverColors[driverId], strokeOpacity: 0.9
      });
    }
    events.forEach(e => {
      if (e.lat && e.lon) new kakao.maps.Marker({ map: detailMap, position: new kakao.maps.LatLng(e.lat, e.lon) });
    });
  }
};

window.renderAllPaths = function() {
  if (!window.kakaoMap) return;
  Object.values(window.polylines).flat().forEach(l => l.setMap(null));
  Object.values(window.eventMarkers).flat().forEach(m => m.marker?.setMap(null));
  Object.values(window.dangerPolylines).flat().forEach(l => l.setMap(null));
  window.polylines = {}; window.eventMarkers = {}; window.dangerPolylines = {};

  const legend = document.getElementById('legend-list');
  legend.innerHTML = '';
  let firstPoint = null;

  for (const [id, d] of Object.entries(window.driversData)) {
    const color = window.driverColors[id];
    const sessionKeys = Object.keys(d.sessions).sort().reverse();
    if (!sessionKeys.length) continue;
    const session = d.sessions[sessionKeys[0]];
    const gpsPath = session.gps_path ? Object.values(session.gps_path) : [];
    const events = session.events ? Object.values(session.events) : [];

    window.polylines[id] = [];
    window.eventMarkers[id] = [];
    window.dangerPolylines[id] = [];

    if (gpsPath.length > 1) {
      const path = gpsPath.map(p => new kakao.maps.LatLng(p.lat, p.lon));
      if (!firstPoint) firstPoint = path[0];
      window.polylines[id].push(new kakao.maps.Polyline({
        map: window.kakaoMap, path,
        strokeWeight: 4, strokeColor: color, strokeOpacity: 0.85
      }));
    }

    events.forEach((e, i) => {
      if (!e.lat || !e.lon) return;
      const marker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(e.lat, e.lon), title: `졸음 #${i+1}` });
      window.eventMarkers[id].push({ marker, event: e });
    });

    // 위험 구간
    const validEvt = events.filter(e => e.lat && e.lon);
    for (let i = 0; i < validEvt.length; i++) {
      const cluster = validEvt.filter(e => getDistance(validEvt[i].lat, validEvt[i].lon, e.lat, e.lon) <= 1000);
      if (cluster.length >= 3) {
        const first = cluster[0], last = cluster[cluster.length-1];
        const dangerPath = gpsPath.filter(p => {
          const t = new Date(p.timestamp).getTime();
          return t >= new Date(first.timestamp).getTime() && t <= new Date(last.timestamp).getTime();
        });
        if (dangerPath.length > 1) {
          window.dangerPolylines[id].push(new kakao.maps.Polyline({
            path: dangerPath.map(p => new kakao.maps.LatLng(p.lat, p.lon)),
            strokeWeight: 7, strokeColor: '#f85149', strokeOpacity: 0.95
          }));
        }
        break;
      }
    }

    const item = document.createElement('div');
    item.className = 'driver-legend';
    item.id = `legend-${id}`;
    item.innerHTML = `<div class="legend-line" style="background:${color}"></div><div class="legend-name">${d.profile.name||id}</div><div class="legend-events">${events.length>0?'⚠️ '+events.length:'정상'}</div>`;
    item.onclick = () => selectDriver(id);
    legend.appendChild(item);
  }
  if (firstPoint) window.kakaoMap.setCenter(firstPoint);
};

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

window.selectDriver = function(id) {
  if (window.selectedDriver === id) {
    window.selectedDriver = null;
    document.querySelectorAll('.driver-item,.driver-legend').forEach(el => el.classList.remove('active','selected'));
    // 마커 숨기기
    for (const markers of Object.values(window.eventMarkers)) {
      markers.forEach(({ marker }) => marker.setMap(null));
    }
    // 위험 구간 서서히 사라지기
    for (const lines of Object.values(window.dangerPolylines)) {
      lines.forEach(l => {
        animateDangerLine(l, 0.95, 0, 600, () => l.setMap(null));
      });
    }
    // 경로 원래 색으로 부드럽게 복귀
    animatePolylines(null);
    return;
  }

  window.selectedDriver = id;
  document.querySelectorAll('.driver-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`sidebar-${id}`)?.classList.add('active');
  document.querySelectorAll('.driver-legend').forEach(el => el.classList.remove('selected'));
  document.getElementById(`legend-${id}`)?.classList.add('selected');

  // 색상 애니메이션
  animatePolylines(id);

  // 위험 구간 표시 (서서히)
  for (const [did, lines] of Object.entries(window.dangerPolylines)) {
    if (did === id) {
      lines.forEach(l => {
        l.setMap(window.kakaoMap);
        l.setOptions({ strokeOpacity: 0 });
        animateDangerLine(l, 0, 0.95, 800);
      });
    } else {
      lines.forEach(l => l.setMap(null));
    }
  }

  // 졸음 이벤트 마커 (리스너 중복 방지)
  for (const [did, markers] of Object.entries(window.eventMarkers)) {
    markers.forEach(({ marker, event }) => {
      kakao.maps.event.removeListener(marker, 'click');
      if (did === id) {
        marker.setMap(window.kakaoMap);
        kakao.maps.event.addListener(marker, 'click', () => showEventPopup(event, marker));
      } else {
        marker.setMap(null);
      }
    });
  }

  // 지도 부드럽게 이동
  const d = window.driversData[id];
  const path = window.polylines[id];
  if (path && path.length > 0) {
    // 경로 중간 지점으로 이동
    const latLngs = path[0].getPath();
    if (latLngs && latLngs.length > 0) {
      const mid = latLngs[Math.floor(latLngs.length / 2)];
      window.kakaoMap.panTo(mid);
    }
  } else if (d?.currentGps?.lat) {
    window.kakaoMap.panTo(new kakao.maps.LatLng(d.currentGps.lat, d.currentGps.lon));
  }
};

// 위험 구간 opacity 애니메이션
function animateDangerLine(line, fromOpacity, toOpacity, duration, callback) {
  const startTime = performance.now();
  function animate(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    const opacity = fromOpacity + (toOpacity - fromOpacity) * ease;
    line.setOptions({ strokeOpacity: Math.max(0, Math.min(1, opacity)) });
    if (t < 1) {
      requestAnimationFrame(animate);
    } else if (callback) {
      callback();
    }
  }
  requestAnimationFrame(animate);
}

// 부드러운 색상 전환 애니메이션 (requestAnimationFrame 기반)
function animatePolylines(selectedId) {
  const DURATION = 800; // ms
  const startTime = performance.now();

  const startOpacity = {};
  const targetOpacity = {};
  const targetColor = {};
  const targetWeight = {};

  for (const [did, lines] of Object.entries(window.polylines)) {
    const isSelected = did === selectedId;
    const isNone = selectedId === null;
    startOpacity[did] = window._currentOpacity?.[did] ?? 0.85;
    targetOpacity[did] = isNone ? 0.85 : (isSelected ? 1.0 : 0.12);
    targetColor[did] = isSelected ? '#3fb950' : window.driverColors[did];
    targetWeight[did] = isSelected ? 6 : (isNone ? 4 : 3);
  }

  if (!window._currentOpacity) window._currentOpacity = {};

  if (window._animFrame) cancelAnimationFrame(window._animFrame);

  function animate(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / DURATION, 1);
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;

    for (const [did, lines] of Object.entries(window.polylines)) {
      const opacity = startOpacity[did] + (targetOpacity[did] - startOpacity[did]) * ease;
      window._currentOpacity[did] = opacity;
      lines.forEach(l => l.setOptions({
        strokeColor: targetColor[did],
        strokeOpacity: Math.max(0.05, Math.min(1.0, opacity)),
        strokeWeight: targetWeight[did]
      }));
    }

    if (t < 1) {
      window._animFrame = requestAnimationFrame(animate);
    } else {
      window._animFrame = null;
    }
  }

  window._animFrame = requestAnimationFrame(animate);
}

window.showEventPopup = function(event, marker) {
  const t = new Date(event.timestamp).toLocaleString('ko-KR');
  document.getElementById('popup-content').innerHTML = `
    <div class="row"><span>시각</span><span>${t}</span></div>
    <div class="row"><span>상태</span><span style="color:var(--yellow)">졸음 감지</span></div>
    <div class="row"><span>위치</span><span>${event.lat?.toFixed(5)}, ${event.lon?.toFixed(5)}</span></div>`;
  const popup = document.getElementById('event-popup');
  popup.style.display = 'block';
  // 마커 위치 기반으로 팝업 위치 조정
  if (marker && window.kakaoMap) {
    const proj = window.kakaoMap.getProjection();
    const pos = proj.containerPointFromCoords(marker.getPosition());
    popup.style.left = Math.min(pos.x, window.kakaoMap.getNode().offsetWidth - 220) + 'px';
    popup.style.top = Math.max(10, pos.y - 120) + 'px';
    popup.style.transform = 'none';
  }
};
window.closePopup = function() { document.getElementById('event-popup').style.display = 'none'; };

window.switchTab = function(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.getElementById(`nav-${tab}`).classList.add('active');
  const titles = { map: '전체 운전자 현황', drivers: '운전자 상태', stats: '통계 대시보드' };
  document.getElementById('topbar-title').textContent = titles[tab] || tab;
  if (tab==='map' && window.kakaoMap) setTimeout(()=>renderAllPaths(), 100);
  if (tab==='stats') renderStats();
};

window.renderStats = function() {
  const data = window.driversData;
  if (!data) return;

  // 전체 통계 계산
  let totalSessions = 0, totalEvents = 0, totalDanger = 0;
  const driverStats = {};

  for (const [id, d] of Object.entries(data)) {
    const sessions = Object.values(d.sessions || {});
    let evtCount = 0;
    let dangerCount = 0;
    const dateCounts = {};

    sessions.forEach(s => {
      const events = Object.values(s.events || {});
      evtCount += events.length;

      // 날짜별 집계
      if (s.start_time) {
        const date = s.start_time.slice(5, 10); // MM-DD
        dateCounts[date] = (dateCounts[date] || 0) + events.length;
      }

      // 위험 구간 감지 - 세션 단위로 계산 (중복 방지)
      const validEvts = events.filter(e => e.lat && e.lon);
      const used = new Set();
      for (let i = 0; i < validEvts.length; i++) {
        if (used.has(i)) continue;
        const cluster = [];
        for (let j = 0; j < validEvts.length; j++) {
          if (used.has(j)) continue;
          const R = 6371000;
          const dLat = (validEvts[j].lat - validEvts[i].lat) * Math.PI/180;
          const dLon = (validEvts[j].lon - validEvts[i].lon) * Math.PI/180;
          const a = Math.sin(dLat/2)**2 + Math.cos(validEvts[i].lat*Math.PI/180)*Math.cos(validEvts[j].lat*Math.PI/180)*Math.sin(dLon/2)**2;
          const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
          if (dist <= 1000) cluster.push(j);
        }
        if (cluster.length >= 3) {
          dangerCount++;
          cluster.forEach(j => used.add(j));
          break; // 세션당 위험구간은 1개로 제한
        }
      }
    });

    totalSessions += sessions.length;
    totalEvents += evtCount;
    totalDanger += dangerCount;
    driverStats[id] = { name: d.profile.name || id, sessions: sessions.length, events: evtCount, danger: dangerCount, dateCounts };
  }

  // 전체 요약 카드
  document.getElementById('stats-summary').innerHTML = `
    <div class="summary-card">
      <div class="s-value" style="color:var(--accent)">${Object.keys(data).length}</div>
      <div class="s-label">총 운전자</div>
    </div>
    <div class="summary-card">
      <div class="s-value" style="color:var(--green)">${totalSessions}</div>
      <div class="s-label">총 운행 횟수</div>
    </div>
    <div class="summary-card">
      <div class="s-value" style="color:var(--yellow)">${totalEvents}</div>
      <div class="s-label">총 졸음 이벤트</div>
    </div>
    <div class="summary-card">
      <div class="s-value" style="color:var(--red)">${totalDanger}</div>
      <div class="s-label">위험 구간</div>
    </div>`;

  // 날짜별 추이 (최근 6일)
  const allDates = {};
  for (const st of Object.values(driverStats)) {
    for (const [date, cnt] of Object.entries(st.dateCounts)) {
      allDates[date] = (allDates[date] || 0) + cnt;
    }
  }
  const sortedDates = Object.keys(allDates).sort().slice(-6);
  const maxDay = Math.max(...Object.values(allDates), 1);
  document.getElementById('trend-grid').innerHTML = sortedDates.map(date => {
    const cnt = allDates[date] || 0;
    const intensity = cnt / maxDay;
    const color = cnt === 0 ? 'var(--green)' : cnt <= 2 ? 'var(--yellow)' : 'var(--red)';
    return `<div class="trend-day">
      <div class="t-date">${date}</div>
      <div class="t-count" style="color:${color}">${cnt}</div>
      <div class="t-label">졸음</div>
    </div>`;
  }).join('');

  // 막대 그래프
  const maxEvt = Math.max(...Object.values(driverStats).map(s => s.events), 1);
  const sorted = Object.entries(driverStats).sort((a,b) => b[1].events - a[1].events);
  document.getElementById('bar-chart').innerHTML = sorted.map(([id, st]) => {
    const pct = Math.round((st.events / maxEvt) * 100);
    const color = window.driverColors[id] || '#58a6ff';
    return `<div class="bar-row">
      <div class="bar-name">${st.name}</div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="bar-count" style="color:${color}">${st.events}회</div>
    </div>`;
  }).join('');

  // 위험 순위
  document.getElementById('rank-list').innerHTML = sorted.map(([id, st], i) => {
    const color = window.driverColors[id] || '#58a6ff';
    const riskColor = st.events >= 5 ? 'var(--red)' : st.events >= 3 ? 'var(--yellow)' : 'var(--green)';
    return `<div class="rank-card ${i===0?'rank-1':''}">
      <div class="rank-num">${i+1}</div>
      <div class="driver-dot" style="background:${color};width:12px;height:12px;border-radius:50%;flex-shrink:0"></div>
      <div class="rank-info">
        <div class="name">${st.name}</div>
        <div class="detail">총 운행 ${st.sessions}회 · 위험구간 ${st.danger}곳</div>
      </div>
      <div class="rank-badge" style="background:${riskColor}22;color:${riskColor}">${st.events}회</div>
    </div>`;
  }).join('');
};

window.doLogin = function() {
  const id = document.getElementById('login-id').value;
  const pw = document.getElementById('login-pw').value;
  if (id==='admin' && pw==='admin') {
    document.getElementById('login-screen').style.display = 'none';
    window.loadAllData().then(() => {
      kakao.maps.load(function() {
        var container = document.getElementById('map');
        window.kakaoMap = new kakao.maps.Map(container, {
          center: new kakao.maps.LatLng(37.5422, 126.8416), level: 7
        });
        window.renderAllPaths();
      });
    });
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
};
document.getElementById('login-pw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

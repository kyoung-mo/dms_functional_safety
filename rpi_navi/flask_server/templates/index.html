<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>DMS Navi</title>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script type="text/javascript"
        src="//dapi.kakao.com/v2/maps/sdk.js?appkey=5735c411c5a31661741adfbd0cd7857d&autoload=false">
    </script>
</head>
<body>
    <div id="status" style="font-size:24px; padding:10px;">State: 0</div>
    <div id="map" style="width:100%;height:500px;"></div>

<script>
kakao.maps.load(function() {
    var map = new kakao.maps.Map(document.getElementById('map'), {
        center: new kakao.maps.LatLng(37.5665, 126.9780),
        level: 5
    });

    var socket = io();
    socket.on('state_update', function(data) {
        document.getElementById('status').innerText = 'State: ' + data.state;
        if (data.state >= 1 && data.lat && data.lon) {
            var pos = new kakao.maps.LatLng(data.lat, data.lon);
            var marker = new kakao.maps.Marker({
                position: pos,
                map: map
            });
            map.setCenter(pos);
            var label = data.state === 2 ? '😴 졸음' : '⚠️ 주의';
            var infowindow = new kakao.maps.InfoWindow({
                content: '<div style="padding:5px;">' + label + '</div>'
            });
            infowindow.open(map, marker);
        }
    });
});
</script>
</body>
</html>
